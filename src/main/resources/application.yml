server:
  port: 8081
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: taskflow

  datasource:
    url: jdbc:mysql://localhost:3306/taskflow2?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver


  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id

knife4j:
  enable: true

taskflow:
  task:
    scan-delay-ms: 5000
    batch-size: 100
    scan-lock-key: taskflow:lock:task-scan
    scan-lock-ttl-ms: 30000
  ai:
    provider: deepseek
    deepseek:
      base-url: https://api.deepseek.com
      model: deepseek-v4-flash
      api-key: ${DEEPSEEK_API_KEY}
      temperature: 0.7
      max-tokens: 1200
  jwt:
    secret: taskflow-taskflow-taskflow-taskflow-123456
    expire-hours: 24




